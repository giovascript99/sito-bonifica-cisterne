<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Richiesta Ricevuta | Bonifica Cisterne</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://kit.fontawesome.com/f850baf9b6.js" crossorigin="anonymous"></script>
    <style>
        :root {
            --primary: #0044cc;
            --dark: #0d1117;
        }

        body {
            background-color: #f4f7fa;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }

        .thank-you-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .thank-you-card {
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
            border: 1px solid rgba(0, 0, 0, 0.05);
            max-width: 550px;
            width: 100%;
            overflow: hidden;
            text-align: center;
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .success-header {
            background: linear-gradient(135deg, var(--primary), #002D72);
            padding: 40px;
            color: white;
        }

        .check-icon {
            font-size: 4rem;
            animation: bounceIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes bounceIn {
            0% {
                transform: scale(0);
            }

            50% {
                transform: scale(1.2);
            }

            100% {
                transform: scale(1);
            }
        }

        .content-body {
            padding: 40px;
        }

        .btn-return {
            background-color: var(--primary);
            color: white;
            border-radius: 12px;
            font-weight: 700;
            padding: 15px 30px;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-return:hover {
            background-color: #002D72;
            color: white;
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0, 68, 204, 0.2);
        }

        .urgent-call {
            background: #fff9e6;
            border: 1px solid #ffeeba;
            border-radius: 12px;
            padding: 15px;
            color: #856404;
            font-size: 0.95rem;
        }
    </style>
</head>

<body>

    <div class="thank-you-wrapper">
        <div class="thank-you-card">
            <div class="success-header">
                <i class="fa-solid fa-circle-check check-icon"></i>
                <h2 class="mt-3 fw-bold">Richiesta Ricevuta!</h2>
            </div>

            <div class="content-body">
                <p class="text-muted mb-4">
                    Grazie per averci scelto. I tuoi dati sono stati trasmessi correttamente al nostro ufficio tecnico.
                    Ti ricontatteremo entro <strong>24 ore</strong>.
                </p>

                <div class="urgent-call mb-4">
                    <p class="mb-1 fw-bold"><i class="fa-solid fa-phone-flip me-2"></i>Hai un'urgenza?</p>
                    <a href="tel:+393331234567" class="text-dark fw-bold text-decoration-none h5">333 1234567</a>
                </div>

                <a href="index.html" class="btn-return w-100">
                    <i class="fa-solid fa-arrow-left me-2"></i> Torna alla Home
                </a>
            </div>
        </div>
    </div>

</body>

</html>
